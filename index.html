<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Happy Birthday, Nida Fathima</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Amiri&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #F5EDD8 0%, #EDE0C4 50%, #E8D8B5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.2rem;
    font-family: 'Cormorant Garamond', serif;
  }

  .letter {
    background: #FDFAF3;
    position: relative;
    padding: 3.2rem 3.4rem 3rem;
    max-width: 610px;
    width: 100%;
    box-shadow:
      0 2px 6px rgba(0,0,0,0.07),
      0 8px 40px rgba(0,0,0,0.10),
      0 0 0 1.5px #C9A552,
      0 0 0 8px #FDFAF3,
      0 0 0 9.5px rgba(201,165,82,0.30);
  }

  .letter::after {
    content: '';
    position: absolute;
    inset: 14px;
    border: 0.6px solid rgba(201,165,82,0.30);
    pointer-events: none;
  }

  /* Corner ornaments */
  .co { position: absolute; width: 36px; height: 36px; z-index: 3; }
  .co-tl { top:-1px;    left:-1px; }
  .co-tr { top:-1px;    right:-1px;  transform:scaleX(-1); }
  .co-bl { bottom:-1px; left:-1px;   transform:scaleY(-1); }
  .co-br { bottom:-1px; right:-1px;  transform:scale(-1,-1); }

  /* Top ornament */
  .top-orn {
    text-align: center;
    margin-bottom: 2.2rem;
    opacity: 0;
    transition: opacity 1.6s ease;
  }
  .top-orn.show { opacity: 1; }

  /* Content */
  #content { min-height: 260px; }

  .blk { margin-bottom: 1.5rem; line-height: 1.9; }

  .opening {
    font-size: clamp(1.45rem, 4.2vw, 2rem);
    font-weight: 400;
    color: #1E1208;
    letter-spacing: 0.035em;
  }

  .body {
    font-size: clamp(1rem, 2.8vw, 1.24rem);
    font-weight: 300;
    font-style: italic;
    color: #332010;
    letter-spacing: 0.02em;
    opacity: 0.87;
  }

  .arabic-text {
    font-family: 'Amiri', serif;
    font-size: clamp(1.5rem, 4.5vw, 2.1rem);
    color: #8B6510;
    direction: rtl;
    line-height: 1.65;
  }

  .arabic-tr {
    font-size: clamp(0.78rem, 2vw, 0.9rem);
    font-style: italic;
    color: #8B6510;
    opacity: 0.58;
    letter-spacing: 0.06em;
    margin-top: 0.2rem;
  }

  .closing {
    font-size: clamp(1.1rem, 3.2vw, 1.45rem);
    font-weight: 400;
    font-style: italic;
    color: #1E1208;
    letter-spacing: 0.04em;
  }

  .div-line {
    text-align: center;
    color: #C9A552;
    opacity: 0.42;
    font-size: 0.85rem;
    letter-spacing: 0.5em;
    margin: 0.8rem 0 1.3rem;
    user-select: none;
  }

  /* Cursor */
  .cursor {
    display: inline-block;
    width: 1.5px;
    height: 1em;
    background: #A0780E;
    margin-left: 1.5px;
    vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
  }
  .cursor.off { display: none; }

  @keyframes blink {
    0%,100% { opacity:1; }
    50%      { opacity:0; }
  }

  @media (max-width: 480px) {
    .letter { padding: 2.4rem 1.8rem 2.2rem; }
    .letter::after { inset: 10px; }
  }
</style>
</head>
<body>

<div class="letter">

  <!-- Corner ornaments -->
  <svg class="co co-tl" viewBox="0 0 36 36" fill="none">
    <path d="M2 34 L2 2 L34 2" stroke="#C9A552" stroke-width="1.3"/>
    <path d="M10 2 Q10 10 2 10" stroke="#C9A552" stroke-width="0.7" fill="none"/>
    <path d="M19 2 Q19 19 2 19" stroke="#C9A552" stroke-width="0.4" fill="none" opacity="0.5"/>
    <circle cx="2" cy="2" r="2.2" fill="#C9A552"/>
    <circle cx="2"  cy="34" r="1.1" fill="#C9A552" opacity="0.45"/>
    <circle cx="34" cy="2"  r="1.1" fill="#C9A552" opacity="0.45"/>
  </svg>
  <svg class="co co-tr" viewBox="0 0 36 36" fill="none">
    <path d="M2 34 L2 2 L34 2" stroke="#C9A552" stroke-width="1.3"/>
    <path d="M10 2 Q10 10 2 10" stroke="#C9A552" stroke-width="0.7" fill="none"/>
    <path d="M19 2 Q19 19 2 19" stroke="#C9A552" stroke-width="0.4" fill="none" opacity="0.5"/>
    <circle cx="2" cy="2" r="2.2" fill="#C9A552"/>
    <circle cx="2"  cy="34" r="1.1" fill="#C9A552" opacity="0.45"/>
    <circle cx="34" cy="2"  r="1.1" fill="#C9A552" opacity="0.45"/>
  </svg>
  <svg class="co co-bl" viewBox="0 0 36 36" fill="none">
    <path d="M2 34 L2 2 L34 2" stroke="#C9A552" stroke-width="1.3"/>
    <path d="M10 2 Q10 10 2 10" stroke="#C9A552" stroke-width="0.7" fill="none"/>
    <path d="M19 2 Q19 19 2 19" stroke="#C9A552" stroke-width="0.4" fill="none" opacity="0.5"/>
    <circle cx="2" cy="2" r="2.2" fill="#C9A552"/>
    <circle cx="2"  cy="34" r="1.1" fill="#C9A552" opacity="0.45"/>
    <circle cx="34" cy="2"  r="1.1" fill="#C9A552" opacity="0.45"/>
  </svg>
  <svg class="co co-br" viewBox="0 0 36 36" fill="none">
    <path d="M2 34 L2 2 L34 2" stroke="#C9A552" stroke-width="1.3"/>
    <path d="M10 2 Q10 10 2 10" stroke="#C9A552" stroke-width="0.7" fill="none"/>
    <path d="M19 2 Q19 19 2 19" stroke="#C9A552" stroke-width="0.4" fill="none" opacity="0.5"/>
    <circle cx="2" cy="2" r="2.2" fill="#C9A552"/>
    <circle cx="2"  cy="34" r="1.1" fill="#C9A552" opacity="0.45"/>
    <circle cx="34" cy="2"  r="1.1" fill="#C9A552" opacity="0.45"/>
  </svg>

  <!-- Top ornament -->
  <div class="top-orn" id="topOrn">
    <svg width="190" height="22" viewBox="0 0 190 22" fill="none">
      <line x1="0"   y1="11" x2="72"  y2="11" stroke="#C9A552" stroke-width="0.6" opacity="0.5"/>
      <line x1="118" y1="11" x2="190" y2="11" stroke="#C9A552" stroke-width="0.6" opacity="0.5"/>
      <path d="M76 11 L80 4 L84 11 L88 4 L92 11 L95 7 L98 11 L102 4 L106 11 L110 4 L114 11"
            stroke="#C9A552" stroke-width="0.9" fill="none" opacity="0.82"/>
      <circle cx="95" cy="11" r="2" fill="#C9A552" opacity="0.7"/>
    </svg>
  </div>

  <!-- Letter typed here -->
  <div id="content"><span class="cursor" id="cur"></span></div>

</div>

<script>
const content = document.getElementById('content');
const cur     = document.getElementById('cur');

setTimeout(() => document.getElementById('topOrn').classList.add('show'), 300);

const pause = ms => new Promise(r => setTimeout(r, ms));

async function type(el, text, speed) {
  for (const ch of text) {
    if (ch === '\n') el.appendChild(document.createElement('br'));
    else             el.appendChild(document.createTextNode(ch));
    el.appendChild(cur);
    await pause(speed + Math.random() * 16);
  }
}

async function run() {
  await pause(1000);

  // 1. Opening
  const b0 = document.createElement('div');
  b0.className = 'blk opening';
  content.insertBefore(b0, cur);
  await type(b0, 'Happy Birthday, Nida Fathima.', 62);
  content.appendChild(cur);
  await pause(650);

  divider();
  await pause(480);

  // 2. Dua 1
  const b1 = document.createElement('div');
  b1.className = 'blk body';
  content.insertBefore(b1, cur);
  await type(b1, 'May Allah grant you what you\'ve\nbeen quietly wishing for.', 40);
  content.appendChild(cur);
  await pause(700);

  // 3. Dua 2
  const b2 = document.createElement('div');
  b2.className = 'blk body';
  content.insertBefore(b2, cur);
  await type(b2, 'May this year be lighter,\nwarmer, and full of ease.', 40);
  content.appendChild(cur);
  await pause(700);

  // 4. Dua 3
  const b3 = document.createElement('div');
  b3.className = 'blk body';
  content.insertBefore(b3, cur);
  await type(b3, 'May every door that matters\nopen for you — at the right time.', 40);
  content.appendChild(cur);
  await pause(650);

  divider();
  await pause(480);

  // 5. Arabic dua
  const b4 = document.createElement('div');
  b4.className = 'blk';
  content.insertBefore(b4, cur);

  const ar = document.createElement('div');
  ar.className = 'arabic-text';
  b4.appendChild(ar);
  b4.appendChild(cur);
  await type(ar, 'بَارَكَ اللهُ فِيكِ', 68);

  const tr = document.createElement('div');
  tr.className = 'arabic-tr';
  b4.appendChild(tr);
  b4.appendChild(cur);
  await pause(320);
  await type(tr, '— May Allah bless you.', 36);
  content.appendChild(cur);
  await pause(650);

  divider();
  await pause(480);

  // 6. Closing
  const b5 = document.createElement('div');
  b5.className = 'blk closing';
  content.insertBefore(b5, cur);
  await type(b5, 'Happy Birthday, once again.', 58);
  content.appendChild(cur);

  await pause(1400);
  cur.classList.add('off');
}

function divider() {
  const d = document.createElement('div');
  d.className = 'div-line';
  d.textContent = '· · ·';
  content.insertBefore(d, cur);
}

run();
</script>
</body>
</html>
